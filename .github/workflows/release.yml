name: Auto Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Bump Version
        id: bump
        run: |
          chmod +x scripts/bump-version.sh
          bash scripts/bump-version.sh

      - name: Build
        run: mvn clean package -B -DskipTests

      - name: Commit & Tag
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "release: v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "AtomCleaner v${{ steps.bump.outputs.version }}"
          body: |
            ## AtomCleaner v${{ steps.bump.outputs.version }}

            **Otomatik release** — `main` branch'e push sonrası oluşturuldu.

            ### Değişiklikler
            - Commit: ${{ github.event.head_commit.message }}
            - Commit SHA: `${{ github.sha }}`

            ### Kurulum
            1. JAR dosyasını indirin
            2. Sunucunuzun `plugins/` klasörüne koyun
            3. Sunucuyu yeniden başlatın
          files: |
            target/AtomCleaner-*.jar
          draft: false
          prerelease: false
